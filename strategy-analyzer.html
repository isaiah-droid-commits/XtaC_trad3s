<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Backtesting Engine — XtAC Trades</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap');
  :root { --bg-deep: #0B1220; --bg-card: #111827; --blue: #3B82F6; --white: #F8FAFC; --muted: #94A3B8; --border: rgba(255,255,255,0.07); }
  body { background: var(--bg-deep); color: var(--white); font-family: 'Inter', sans-serif; padding: 80px 24px; text-align: center; }
  .container { background: var(--bg-card); max-width: 650px; margin: 40px auto; padding: 40px; border-radius: 16px; border: 1px solid var(--border); text-align: left; }
  h1 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 8px; }
  textarea { width: 100%; height: 120px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; font-family: inherit; margin: 16px 0; resize: none; }
  .btn { display: inline-block; background: var(--blue); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; }
</style>
</head>
<body>
  <div class="container">
    <h1>Strategy Analyzer</h1>
    <p style="color:var(--muted)">Paste rules, technical indicators, or links to external trading strategies below for structural verification evaluation metrics.</p>
    <textarea placeholder="Example: Buy when 50 EMA crosses above 200 EMA on 15m timeframe with RSI below 30..."></textarea>
    <button class="btn" onclick="alert('Analysis pipeline initiated. Results will sync shortly.')">Compute Quantitative Backtest</button>
    <a href="index.html" style="margin-left: 15px; color: var(--muted); text-decoration: none; font-size: 14px;">Return</a>
  </div>
</body>
</html>
